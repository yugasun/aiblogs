[book]
title = "AI Agent 技术博客"
description = "由 AI 生成的技术博客，深入探讨现代 AI Agent 的架构设计与最佳实践"
authors = ["AI Blog"]
language = "zh-CN"

[output.html]
default-theme = "light"
theme = "theme"
git-repository-url = "https://github.com/yugasun/ai-blogs"
edit-url-template = "https://github.com/yugasun/ai-blogs/edit/main/src/{path}"

[output.html.search]
enable = true

[output.html.fold]
enable = true

[build]
create-missing = true